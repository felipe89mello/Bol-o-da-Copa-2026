<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Bolão da Copa 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════
       VARIÁVEIS DE COR E TEMA
       Mude aqui para personalizar as cores do app
    ══════════════════════════════════════════ */
    :root {
      --bg:         #0a1628;
      --bg2:        #0f1f3d;
      --bg3:        #162848;
      --card:       #1a2f52;
      --border:     #1e3a6e;
      --gold:       #f5c518;
      --gold2:      #e6b800;
      --green:      #22c55e;
      --red:        #ef4444;
      --blue:       #3b82f6;
      --text:       #e8eef8;
      --text2:      #8ca0c0;
      --radius:     14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    header {
      background: linear-gradient(135deg, var(--bg2), var(--bg3));
      border-bottom: 2px solid var(--gold);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--gold);
    }

    .logo span { color: var(--text); }

    #btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      display: none;
    }

    /* ══════════════════════════════════════════
       NAVEGAÇÃO POR ABAS
    ══════════════════════════════════════════ */
   nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: none;
   }
   nav.visivel { display: flex; }

    nav button {
      flex: 1;
      padding: 13px 8px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    nav button.ativa {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ══════════════════════════════════════════
       TELA DE LOGIN / CADASTRO
    ══════════════════════════════════════════ */
    #tela-auth {
      padding: 40px 24px;
    }

    .auth-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .auth-sub {
      color: var(--text2);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .tabs-auth {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tabs-auth button {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: none;
      color: var(--text2);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tabs-auth button.ativa {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
    }

    .form-grupo {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 6px;
      font-weight: 500;
    }

    input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 16px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: var(--gold); }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .erro { color: var(--red); font-size: 13px; margin-top: 10px; text-align: center; }

    /* ══════════════════════════════════════════
       CONTEÚDO PRINCIPAL
    ══════════════════════════════════════════ */
    #conteudo { padding: 20px 16px; }
    #conteudo.oculto { display: none; }

    .bem-vindo {
      background: linear-gradient(135deg, var(--card), var(--bg3));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bem-vindo .emoji { font-size: 28px; }

    .bem-vindo h2 { font-size: 16px; font-weight: 700; }
    .bem-vindo p { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* ══════════════════════════════════════════
       CARDS DE JOGOS
    ══════════════════════════════════════════ */
    .secao-titulo {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text2);
      margin-bottom: 12px;
    }

    .jogo-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .jogo-card.com-palpite { border-color: var(--green); }
    .jogo-card.encerrado { opacity: 0.75; }

    .jogo-fase {
      font-size: 11px;
      color: var(--gold);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .jogo-times {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
    }

    .time {
      text-align: center;
      flex: 1;
    }

    .time-emoji { font-size: 28px; display: block; }
    .time-nome { font-size: 13px; font-weight: 700; margin-top: 4px; }

    .placar-real {
      text-align: center;
      min-width: 60px;
    }

    .placar-real .nums {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--gold);
      letter-spacing: 2px;
    }

    .placar-real .vs {
      font-size: 18px;
      color: var(--text2);
      font-family: 'Bebas Neue', sans-serif;
    }

    /* Inputs de palpite */
    .palpite-area {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .palpite-label {
      font-size: 11px;
      color: var(--text2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .palpite-inputs {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }

    .input-placar {
      width: 56px;
      text-align: center;
      font-size: 22px;
      font-family: 'Bebas Neue', sans-serif;
      padding: 8px 4px;
      border-radius: 10px;
      background: var(--bg2);
      border: 2px solid var(--border);
      color: var(--text);
    }

    .input-placar:focus { border-color: var(--gold); }

    .x-palpite {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--text2);
    }

    .btn-palpitar {
      width: 100%;
      padding: 11px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-palpitar:hover { background: #2563eb; }
    .btn-palpitar.salvo { background: var(--green); }
    .btn-palpitar:disabled { opacity: 0.5; cursor: default; }

    .pontos-badge {
      display: inline-block;
      background: var(--gold);
      color: #000;
      font-weight: 700;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 8px;
    }

    .jogo-data {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 12px;
    }

    /* ══════════════════════════════════════════
       RANKING
    ══════════════════════════════════════════ */
    .ranking-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ranking-card.sou-eu {
      border-color: var(--gold);
      background: linear-gradient(135deg, var(--card), #1e3a20);
    }

    .posicao {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: var(--text2);
      min-width: 30px;
      text-align: center;
    }

    .posicao.top1 { color: #ffd700; }
    .posicao.top2 { color: #c0c0c0; }
    .posicao.top3 { color: #cd7f32; }

    .ranking-info { flex: 1; }
    .ranking-nome { font-weight: 700; font-size: 15px; }
    .ranking-stats { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .ranking-pontos {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--gold);
    }

    /* ══════════════════════════════════════════
       LOADING
    ══════════════════════════════════════════ */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text2);
      font-size: 14px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════
       TOAST (NOTIFICAÇÕES)
    ══════════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 14px;
      transition: transform 0.3s;
      z-index: 999;
      white-space: nowrap;
    }

    #toast.erro { background: var(--red); }
    #toast.visivel { transform: translateX(-50%) translateY(0); }

    /* ══════════════════════════════════════════
       ADMIN PANEL
    ══════════════════════════════════════════ */
    .admin-card {
      background: var(--card);
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    .admin-titulo {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    select {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     HEADER
══════════════════════════════════════ -->
<header>
  <div class="logo">⚽ BOLÃO <span>COPA 2026</span></div>
  <button id="btn-logout" onclick="logout()">Sair</button>
</header>

<!-- ══════════════════════════════════════
     ABAS DE NAVEGAÇÃO
══════════════════════════════════════ -->
<nav id="nav">
  <button class="ativa" onclick="mostrarAba('jogos', this)">🎯 Palpites</button>
  <button onclick="mostrarAba('ranking', this)">🏆 Ranking</button>
  <button id="btn-nav-admin" onclick="mostrarAba('admin', this)" style="display:none">⚙️ Admin</button>
</nav>

<!-- ══════════════════════════════════════
     TELA DE LOGIN / CADASTRO
══════════════════════════════════════ -->
<div id="tela-auth">
  <p class="auth-titulo">BOLÃO DA COPA</p>
  <p class="auth-sub">Faça seus palpites e dispute com os amigos!</p>

  <div class="tabs-auth">
    <button class="ativa" onclick="alternarAuth('login', this)">Entrar</button>
    <button onclick="alternarAuth('cadastro', this)">Cadastrar</button>
  </div>

  <!-- FORMULÁRIO DE LOGIN -->
  <div id="form-login">
    <div class="form-grupo">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" />
    </div>
    <div class="form-grupo">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••••" />
    </div>
    <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
    <p id="erro-login" class="erro"></p>
  </div>

  <!-- FORMULÁRIO DE CADASTRO -->
  <div id="form-cadastro" style="display:none">
    <div class="form-grupo">
      <label>Seu nome</label>
      <input type="text" id="cad-nome" placeholder="Como quer aparecer no ranking?" />
    </div>
    <div class="form-grupo">
      <label>E-mail</label>
      <input type="email" id="cad-email" placeholder="seu@email.com" />
    </div>
    <div class="form-grupo">
      <label>Senha</label>
      <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" />
    </div>
    <button class="btn-primary" onclick="fazerCadastro()">Criar conta</button>
    <p id="erro-cadastro" class="erro"></p>
  </div>
</div>

<!-- ══════════════════════════════════════
     CONTEÚDO PRINCIPAL (após login)
══════════════════════════════════════ -->
<div id="conteudo" class="oculto">

  <!-- Boas-vindas -->
  <div class="bem-vindo">
    <span class="emoji">⚽</span>
    <div>
      <h2 id="nome-usuario">Olá!</h2>
      <p>Faça seus palpites antes do apito inicial!</p>
    </div>
  </div>

  <!-- ABA: JOGOS -->
  <div id="aba-jogos">
    <p class="secao-titulo">Jogos disponíveis</p>
    <div id="lista-jogos">
      <div class="loading"><div class="spinner"></div>Carregando jogos...</div>
    </div>
  </div>

  <!-- ABA: RANKING -->
  <div id="aba-ranking" style="display:none">
    <p class="secao-titulo">🏆 Classificação geral</p>
    <div id="lista-ranking">
      <div class="loading"><div class="spinner"></div>Carregando ranking...</div>
    </div>
  </div>

  <!-- ABA: ADMIN -->
  <div id="aba-admin" style="display:none">
    <p class="secao-titulo">⚙️ Painel do Administrador</p>
    <div class="admin-card">
      <p class="admin-titulo">Registrar Resultado</p>
      <label>Selecione o jogo</label>
      <select id="admin-jogo"></select>
      <div style="display:flex;gap:10px;margin-bottom:12px">
        <div style="flex:1">
          <label id="label-casa">Gols Casa</label>
          <input type="number" id="admin-gols-casa" min="0" value="0" />
        </div>
        <div style="flex:1">
          <label id="label-fora">Gols Fora</label>
          <input type="number" id="admin-gols-fora" min="0" value="0" />
        </div>
      </div>
      <button class="btn-primary" onclick="registrarResultado()">Confirmar Resultado</button>
    </div>
  </div>

</div>

<!-- Toast de notificação -->
<div id="toast"></div>

<script>
/* ══════════════════════════════════════════
   CONFIGURAÇÃO
   ⚠️ Troque a URL abaixo pela URL do seu backend hospedado
   Durante desenvolvimento local: http://localhost:8000
   Em produção: https://seu-app.railway.app
══════════════════════════════════════════ */
const API = "http://127.0.0.1:8000"; // ajuste automático para produção

/* ══════════════════════════════════════════
   ESTADO DA APLICAÇÃO
   Guarda dados do usuário logado em memória
══════════════════════════════════════════ */
let token = localStorage.getItem("bolao_token");
let usuario = JSON.parse(localStorage.getItem("bolao_usuario") || "null");

/* ══════════════════════════════════════════
   INICIALIZAÇÃO
   Verifica se já tem sessão salva ao abrir o app
══════════════════════════════════════════ */
window.onload = () => {
  if (token && usuario) mostrarApp();
};

/* ══════════════════════════════════════════
   AUTENTICAÇÃO
══════════════════════════════════════════ */

function alternarAuth(modo, btn) {
  document.getElementById("form-login").style.display = modo === "login" ? "block" : "none";
  document.getElementById("form-cadastro").style.display = modo === "cadastro" ? "block" : "none";
  document.querySelectorAll(".tabs-auth button").forEach(b => b.classList.remove("ativa"));
  btn.classList.add("ativa");
}

async function fazerLogin() {
  const email = document.getElementById("login-email").value.trim();
  const senha = document.getElementById("login-senha").value;
  const erroEl = document.getElementById("erro-login");
  erroEl.textContent = "";

  console.log("1. Tentando login com:", email);

  if (!email || !senha) { erroEl.textContent = "Preencha todos os campos."; return; }

  try {
    console.log("2. Enviando requisição...");
    const res = await fetch(`${API}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, senha })
    });
    console.log("3. Resposta recebida, status:", res.status);
    const data = await res.json();
    console.log("4. Dados:", data);
    if (!res.ok) throw new Error(data.detail);

    console.log("5. Salvando sessão...");
    salvarSessao(data);
    console.log("6. Chamando mostrarApp...");
    mostrarApp();
    console.log("7. mostrarApp executado!");
  } catch (e) {
    console.error("ERRO:", e);
    erroEl.textContent = e.message;
  }
}

async function fazerCadastro() {
  const nome = document.getElementById("cad-nome").value.trim();
  const email = document.getElementById("cad-email").value.trim();
  const senha = document.getElementById("cad-senha").value;
  const erroEl = document.getElementById("erro-cadastro");
  erroEl.textContent = "";

  if (!nome || !email || !senha) { erroEl.textContent = "Preencha todos os campos."; return; }
  if (senha.length < 6) { erroEl.textContent = "A senha deve ter pelo menos 6 caracteres."; return; }

  try {
    const res = await fetch(`${API}/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nome, email, senha })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail);

    salvarSessao(data);
    mostrarApp();
  } catch (e) {
    erroEl.textContent = e.message;
  }
}

function salvarSessao(data) {
  token = data.token;
  usuario = { nome: data.nome, id: data.id };
  localStorage.setItem("bolao_token", token);
  localStorage.setItem("bolao_usuario", JSON.stringify(usuario));
}

function logout() {
  localStorage.removeItem("bolao_token");
  localStorage.removeItem("bolao_usuario");
  token = null; usuario = null;
  document.getElementById("tela-auth").style.display = "block";
  document.getElementById("conteudo").style.display = "none";
  document.getElementById("nav").style.display = "none";
  document.getElementById("btn-logout").style.display = "none";
}

/* ══════════════════════════════════════════
   MOSTRAR APP APÓS LOGIN
══════════════════════════════════════════ */
function mostrarApp() {
  document.getElementById("tela-auth").style.display = "none";
  document.getElementById("conteudo").style.display = "block";
  document.getElementById("conteudo").classList.remove("oculto");
  document.getElementById("nav").classList.add("visivel");
  document.getElementById("btn-logout").style.display = "block";
  document.getElementById("btn-nav-admin").style.display = "block";
  document.getElementById("nome-usuario").textContent = `Olá, ${usuario.nome}! 👋`;
  carregarJogos();
}

/* ══════════════════════════════════════════
   NAVEGAÇÃO POR ABAS
══════════════════════════════════════════ */
function mostrarAba(aba, btn) {
  ["jogos", "ranking", "admin"].forEach(a => {
    document.getElementById(`aba-${a}`).style.display = a === aba ? "block" : "none";
  });
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("ativa"));
  btn.classList.add("ativa");

  if (aba === "ranking") carregarRanking();
  if (aba === "admin") carregarJogosAdmin();
}

/* ══════════════════════════════════════════
   CARREGAR E RENDERIZAR JOGOS
══════════════════════════════════════════ */
async function carregarJogos() {
  const container = document.getElementById("lista-jogos");
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Carregando jogos...</div>';

  try {
    const res = await fetch(`${API}/jogos`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    if (res.status === 401) { logout(); return; }
    const jogos = await res.json();
    renderizarJogos(jogos);
  } catch {
    container.innerHTML = '<p class="erro">Erro ao carregar jogos. Verifique sua conexão.</p>';
  }
}

// Emojis de bandeira por país (simplificado)
const bandeiras = {
  "Brasil": "🇧🇷", "Argentina": "🇦🇷", "França": "🇫🇷", "Alemanha": "🇩🇪",
  "Espanha": "🇪🇸", "Portugal": "🇵🇹", "Inglaterra": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Itália": "🇮🇹",
  "Japão": "🇯🇵", "Coreia do Sul": "🇰🇷", "México": "🇲🇽", "EUA": "🇺🇸",
  "Canadá": "🇨🇦", "Uruguai": "🇺🇾", "Colômbia": "🇨🇴", "Holanda": "🇳🇱",
  "Bélgica": "🇧🇪", "Croácia": "🇭🇷", "Senegal": "🇸🇳", "Marrocos": "🇲🇦",
};

function bandeira(pais) {
  return bandeiras[pais] || "🏳️";
}

function renderizarJogos(jogos) {
  const container = document.getElementById("lista-jogos");
  if (!jogos.length) {
    container.innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px">Nenhum jogo cadastrado ainda.</p>';
    return;
  }

  // Agrupa por fase
  const fases = {};
  jogos.forEach(j => {
    if (!fases[j.fase]) fases[j.fase] = [];
    fases[j.fase].push(j);
  });

  container.innerHTML = Object.entries(fases).map(([fase, lista]) => `
    <p class="secao-titulo" style="margin-top:16px">${fase}</p>
    ${lista.map(jogo => renderizarJogo(jogo)).join("")}
  `).join("");
}

function renderizarJogo(jogo) {
  const temPalpite = jogo.meu_palpite !== null;
  const encerrado = jogo.encerrado;
  const agora = new Date();
  const horarioJogo = new Date(jogo.data_jogo.replace(" ", "T"));
  const bloqueado = agora >= horarioJogo;

  const placarCentro = encerrado
    ? `<div class="placar-real"><div class="nums">${jogo.gols_casa} × ${jogo.gols_fora}</div><div style="font-size:10px;color:var(--text2);margin-top:2px">Resultado</div></div>`
    : `<div class="placar-real"><div class="vs">VS</div></div>`;

  const inputsOuPlacar = encerrado
    ? (temPalpite ? `
        <div style="text-align:center">
          <div style="font-size:13px;color:var(--text2)">Seu palpite: <strong>${jogo.meu_palpite.casa} × ${jogo.meu_palpite.fora}</strong></div>
          <span class="pontos-badge">+${jogo.meu_palpite.pontos} pts</span>
        </div>` : `<p style="font-size:13px;color:var(--text2);text-align:center">Você não fez palpite neste jogo.</p>`)
    : `
      <div class="palpite-label" style="text-align:center">Seu palpite</div>
      <div class="palpite-inputs">
        <input class="input-placar" type="number" min="0" max="20" value="${temPalpite ? jogo.meu_palpite.casa : 0}" id="casa-${jogo.id}" />
        <span class="x-palpite">×</span>
        <input class="input-placar" type="number" min="0" max="20" value="${temPalpite ? jogo.meu_palpite.fora : 0}" id="fora-${jogo.id}" />
      </div>
      <button class="btn-palpitar ${temPalpite ? 'salvo' : ''}" id="btn-${jogo.id}" onclick="enviarPalpite(${jogo.id})" style="margin-top:12px">
        ${temPalpite ? '✅ Palpite salvo — alterar' : '🎯 Salvar palpite'}
      </button>`;

  return `
    <div class="jogo-card ${temPalpite ? 'com-palpite' : ''} ${encerrado ? 'encerrado' : ''}" id="card-${jogo.id}">
      <div class="jogo-fase">${jogo.fase} ${encerrado ? '• Encerrado' : ''}</div>
      <div class="jogo-data">📅 ${jogo.data_jogo}</div>
      <div class="jogo-times">
        <div class="time">
          <span class="time-emoji">${bandeira(jogo.time_casa)}</span>
          <div class="time-nome">${jogo.time_casa}</div>
        </div>
        ${placarCentro}
        <div class="time">
          <span class="time-emoji">${bandeira(jogo.time_fora)}</span>
          <div class="time-nome">${jogo.time_fora}</div>
        </div>
      </div>
      ${inputsOuPlacar}
    </div>`;
}

/* ══════════════════════════════════════════
   ENVIAR PALPITE
══════════════════════════════════════════ */
async function enviarPalpite(jogoId) {
  const casa = parseInt(document.getElementById(`casa-${jogoId}`).value);
  const fora = parseInt(document.getElementById(`fora-${jogoId}`).value);
  const btn = document.getElementById(`btn-${jogoId}`);

  if (isNaN(casa) || isNaN(fora) || casa < 0 || fora < 0) {
    mostrarToast("Placar inválido!", true); return;
  }

  btn.disabled = true;
  btn.textContent = "Salvando...";

  try {
    const res = await fetch(`${API}/palpite`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ jogo_id: jogoId, palpite_casa: casa, palpite_fora: fora })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail);

    btn.textContent = "✅ Palpite salvo — alterar";
    btn.classList.add("salvo");
    document.getElementById(`card-${jogoId}`).classList.add("com-palpite");
    mostrarToast("Palpite salvo! ✅");
  } catch (e) {
    mostrarToast(e.message, true);
    btn.textContent = "🎯 Salvar palpite";
  } finally {
    btn.disabled = false;
  }
}

/* ══════════════════════════════════════════
   RANKING
══════════════════════════════════════════ */
async function carregarRanking() {
  const container = document.getElementById("lista-ranking");
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Carregando...</div>';

  try {
    const res = await fetch(`${API}/ranking`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    const ranking = await res.json();

    container.innerHTML = ranking.map(p => `
      <div class="ranking-card ${p.sou_eu ? 'sou-eu' : ''}">
        <div class="posicao ${p.posicao <= 3 ? 'top' + p.posicao : ''}">
          ${p.posicao === 1 ? '🥇' : p.posicao === 2 ? '🥈' : p.posicao === 3 ? '🥉' : p.posicao + 'º'}
        </div>
        <div class="ranking-info">
          <div class="ranking-nome">${p.nome} ${p.sou_eu ? '(você)' : ''}</div>
          <div class="ranking-stats">${p.total_palpites} palpites • ${p.placares_exatos} exatos 🎯</div>
        </div>
        <div class="ranking-pontos">${p.total_pontos}</div>
      </div>
    `).join("");
  } catch {
    container.innerHTML = '<p class="erro">Erro ao carregar ranking.</p>';
  }
}

/* ══════════════════════════════════════════
   ADMIN: REGISTRAR RESULTADO
══════════════════════════════════════════ */
async function carregarJogosAdmin() {
  try {
    const res = await fetch(`${API}/jogos`, { headers: { "Authorization": `Bearer ${token}` } });
    const jogos = await res.json();
    const select = document.getElementById("admin-jogo");
    select.innerHTML = jogos
      .filter(j => !j.encerrado)
      .map(j => `<option value="${j.id}" data-casa="${j.time_casa}" data-fora="${j.time_fora}">
        ${j.time_casa} × ${j.time_fora} (${j.fase})
      </option>`).join("");

    // Atualiza labels com os times ao trocar
    select.onchange = () => {
      const opt = select.options[select.selectedIndex];
      document.getElementById("label-casa").textContent = `Gols ${opt.dataset.casa}`;
      document.getElementById("label-fora").textContent = `Gols ${opt.dataset.fora}`;
    };
    select.dispatchEvent(new Event("change"));

    document.getElementById("btn-nav-admin").style.display = "block";
  } catch {}
}

async function registrarResultado() {
  const jogoId = document.getElementById("admin-jogo").value;
  const casa = parseInt(document.getElementById("admin-gols-casa").value);
  const fora = parseInt(document.getElementById("admin-gols-fora").value);

  try {
    const res = await fetch(`${API}/resultado`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
      body: JSON.stringify({ jogo_id: parseInt(jogoId), gols_casa: casa, gols_fora: fora })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail);
    mostrarToast("Resultado registrado! ✅");
    carregarJogosAdmin();
    carregarJogos();
  } catch (e) {
    mostrarToast(e.message, true);
  }
}

/* ══════════════════════════════════════════
   TOAST (NOTIFICAÇÃO FLUTUANTE)
══════════════════════════════════════════ */
function mostrarToast(msg, erro = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = erro ? "erro visivel" : "visivel";
  setTimeout(() => t.classList.remove("visivel"), 2800);
}
</script>
